<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transit Map — ogsapps</title>
  <link rel="icon" type="image/jpeg" href="https://ogsapps.cc/logo.jpg">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #12131a;
      color: #e0e0e0;
      height: 100vh;
      overflow: hidden;
    }
    #map { width: 100vw; height: 100vh; }
    .back-btn {
      position: absolute; top: 1rem; left: 1rem; z-index: 1000;
      background: #1a1d2e; border: 1px solid #3a3d55; border-radius: 10px;
      padding: 0.5rem 1rem; color: #c0d0f0; font-size: 0.85rem;
      cursor: pointer; backdrop-filter: blur(8px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .back-btn:hover { background: #252845; }
    .loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-size: 1.2rem; color: #5a6080; z-index: 999;
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="history.back()">← Back to Search</button>
  <div id="map"></div>
  <div class="loading" id="loading">Loading route...</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const API_BASE = 'https://maps.ogsapps.cc/api/transit/route';

    // Line colors matching the transit page
    const LINE_COLORS = {
      'Expo Line': '#5588dd',
      'Millennium Line': '#eebb44',
      'Canada Line': '#44aacc',
      'SeaBus': '#aa8877',
    };

    // Global error handler to catch Leaflet errors
    window.onerror = function(msg, url, line, col, error) {
      console.log('Global error:', msg, 'line:', line);
      return false;
    };

    async function main() {
      const params = new URLSearchParams(window.location.search);
      const from = params.get('from')?.trim();
      const to = params.get('to')?.trim();
      const depart = params.get('depart')?.trim() || '';

      if (!from || !to) {
        document.getElementById('loading').textContent = 'Missing from/to parameters';
        return;
      }

      let url = `${API_BASE}?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`;
      if (depart) url += `&depart=${encodeURIComponent(depart)}`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        if (!data.routes || data.routes.length === 0) throw new Error('No routes found');

        // Use first route
        const route = data.routes[0];
        try {
          renderRoute(route);
        } catch (e) {
          console.log('renderRoute error:', e);
        }
      } catch (e) {
        document.getElementById('loading').textContent = 'Failed: ' + e.message;
      }
    }

    function renderRoute(route) {
      console.log('Rendering route with', route.steps?.length, 'steps');
      try {
        document.getElementById('loading').style.display = 'none';
        
        if (!route.steps || route.steps.length === 0) {
          document.getElementById('loading').textContent = 'No steps in route';
          return;
        }

        const map = L.map('map').setView([49.25, -122.9], 11);

      // Light basemap (CartoDB Voyager) — minimal, transit-friendly
      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        maxZoom: 19,
      }).addTo(map);

      const bounds = L.latLngBounds();

      // Just add bounds without any drawing
      route.steps.forEach(step => {
        try {
          if (step.from_lat && step.from_lon) {
            bounds.extend([step.from_lat, step.from_lon]);
          }
          if (step.to_lat && step.to_lon) {
            bounds.extend([step.to_lat, step.to_lon]);
          }
        } catch(e) {}
      });

      console.log('Bounds:', bounds);
      
      // Fit bounds if we have them
      try {
        if (bounds && bounds.isValid()) {
          map.fitBounds(bounds, { padding: [40, 40], maxZoom: 15 });
        }
      } catch (e) {
        console.log('fitBounds error:', e);
      }
      
      console.log('Render complete!');
      } catch (e) {
        console.log('renderRoute internal error:', e);
        document.getElementById('loading').textContent = 'Render error: ' + e.message;
      }
    }

    // Run
    main();
  </script>
</body>
</html>
